paths:
  base_dir: artifacts

logging:
  level: "INFO"
  file: "artifacts/logs/gvoice.log"
  console: true

tts:
  host: "127.0.0.1"
  ws_host:
  ws_port: 8787
  ws_path: "/v1/tts/ws"

  # Use sherpa_onnx_vits for first-time setup because it can download
  # a public AISHELL3 VITS model automatically.
  backend: "sherpa_onnx_vits"
  sample_rate: 16000
  speaker_id: 0
  speed: 1

  # Genshin VITS tuning fields. They are ignored by sherpa_onnx_vits.
  noise_scale: 0.6
  noise_scale_w: 0.668
  length_scale: 1.2

  num_threads: 4
  stream_chunk_ms: 120
  max_concurrent_requests: 1
  queue_timeout_sec: 5.0
  max_pending_text_requests: 8
  pcm_queue_chunks: 16
  cancel_wait_sec: 3.0
  max_text_chars: 2000

  # Set model_sha256 if you want strict verification for downloaded models.
  model_sha256:

  # Required only when backend is genshin_vits_onnx.
  genshin_model_path: "artifacts/models/vits-models-genshin-bh3/keqing/keqing_tunable.onnx"
  genshin_source_dir: "artifacts/sources/vits-models-genshin-bh3"

  # Required only when backend is cosyvoice3 (GPU 强烈推荐)。
  # sidecar 安装见 sidecars/cosyvoice3/README.md（.\setup.ps1 一键安装）。
  cosyvoice3:
    url: "ws://127.0.0.1:8788/v1/cosyvoice3/ws"
    # 连不上时自动拉起 sidecar（uv run cosyvoice3-sidecar serve）
    autostart: true
    sidecar_dir: "sidecars/cosyvoice3"
    # 模型下载、加载和 warmup 的冷启动上限（秒）
    start_timeout_sec: 600
    # 0.5b（FunAudioLLM/Fun-CosyVoice3-0.5B-2512，默认）或 1.5b；也可填完整模型 id。
    # 修改后重启 GVoice，若 sidecar 正在跑别的模型会自动重启切换
    model: "0.5b"
    # 参考音频，决定输出音色（16k/24k 单声道 5~30 秒干净人声最佳）
    prompt_wav: ""
    # 参考音频逐字转写：填了走 zero_shot 模式（相似度更高），留空走 cross_lingual
    prompt_text:
    # 语速，1.0 原速；留空用 sidecar 默认
    speed:
