paths:
  base_dir: artifacts

logging:
  level: "INFO"
  file: "artifacts/logs/gvoice.log"
  console: true

tts:
  host: "127.0.0.1"
  ws_host:
  ws_port: 8787
  ws_path: "/v1/tts/ws"
  backend: "cosyvoice3"
  sample_rate: 22050
  speaker_id: 115
  speed: 0.85
  noise_scale: 0.6
  noise_scale_w: 0.668
  length_scale: 1.2
  num_threads: 4
  stream_chunk_ms: 120
  max_concurrent_requests: 1
  queue_timeout_sec: 5.0
  genshin_model_path: "artifacts/models/vits-models-genshin-bh3/keqing/keqing_tunable.onnx"
  genshin_source_dir: "artifacts/sources/vits-models-genshin-bh3"
  cosyvoice3:
    url: "ws://127.0.0.1:8788/v1/cosyvoice3/ws"
    autostart: true
    sidecar_dir: "sidecars/cosyvoice3"
    # 0.5b（默认）或 1.5b；也可填完整模型 id。切换后 GVoice 会自动重启 sidecar 换模型
    model: "0.5b"
    # 参考音频（决定音色）；prompt_text 填参考音频逐字转写可提升相似度（zero_shot 模式），
    # 留空则用 cross_lingual 模式（无需转写）
    prompt_wav: "D:/Project/Python_Project/Chat/GVoice/sidecars/Reference Sound/zh_f.wav"
    # 语速，1.0 为原速；留空用 sidecar 默认
    speed:
